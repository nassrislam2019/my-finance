<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>دفتر حساباتي — تتبُّع المصروفات والدخل</title>
<meta name="description" content="موقع شخصي بسيط لإدارة المصروفات والدخل — يعمل أوفلاين (PWA) ويحفظ البيانات محليًا." />
<meta name="theme-color" content="#111827" />
<link rel="manifest" href="manifest.json" />
<style>
:root{
  --bg:#111827;       /* الخلفية العامة */
  --card:#1f2937;     /* بطاقات */
  --muted:#9ca3af;    /* نص ثانوي */
  --txt:#f3f4f6;      /* النص الأساسي */
  --brand:#9ca3af;    /* اللون الرئيسي (رمادي) */
  --brand-2:#cbd5e1;  /* لون ثانوي */
  --danger:#ef4444;   /* أحمر */
  --warn:#f59e0b;     /* برتقالي */
  --ok:#22c55e;       /* أخضر */
  --border:#374151;   /* حدود */
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Noto Kufi Arabic",Tahoma,Arial,sans-serif}
a{color:var(--brand);text-decoration:none}
.container{max-width:1180px;margin-inline:auto;padding:20px}
header{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:16px}
.title{font-weight:800;font-size:20px}
.sub{color:var(--muted);font-size:13px}
.row{display:grid;gap:12px}
@media(min-width:920px){.row{grid-template-columns:1.15fr .85fr}}
.card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid var(--border);border-radius:14px;padding:14px}
.card h3{margin:0 0 10px;font-size:16px}
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-4{grid-template-columns:repeat(4,1fr)}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
input,select,textarea{width:100%;background:#0c0f15;color:var(--txt);border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;outline:none}
input[type="date"], input[type="month"]{direction:ltr}
.btn{appearance:none;border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
.btn-primary{background:var(--brand);color:#111827}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--txt)}
.btn-danger{background:var(--danger);color:#1a0707}
.btn-muted{background:#111522;color:var(--muted);border:1px dashed var(--border)}
.stats{display:grid;gap:10px}
@media(min-width:720px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
.stat small{color:var(--muted)}
.stat .num{font-weight:800;font-size:20px;margin-top:4px}
.pos{color:var(--ok)}.neg{color:var(--danger)}
table{width:100%;border-collapse:separate;border-spacing:0 6px}
thead th{font-size:12px;color:var(--muted);font-weight:600;text-align:right;padding:6px 8px}
tbody tr{background:var(--card);border:1px solid var(--border)}
tbody td{padding:10px 8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
tbody tr td:first-child{border-right:1px solid var(--border);border-top-right-radius:12px;border-bottom-right-radius:12px}
tbody tr td:last-child{border-left:1px solid var(--border);border-top-left-radius:12px;border-bottom-left-radius:12px}
.amount.exp{color:var(--danger);font-weight:700}.amount.inc{color:var(--ok);font-weight:700}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.spacer{flex:1}
.badge{display:inline-flex;gap:6px;align-items:center;background:#0e1320;color:var(--muted);border:1px solid var(--border);padding:6px 10px;border-radius:999px;font-size:12px}
.footer{margin-top:24px;color:var(--muted);font-size:12px;text-align:center}
.note{color:var(--warn)}
canvas{background:#0e1422;border:1px solid var(--border);border-radius:12px;display:block;width:100%;height:320px}
</style>
</head>
<body>
  <!-- ✨ باقي الكود زي آخر نسخة عندك (الهيدر + الإحصائيات + الحركات + الالتزامات + السكربت كامل) -->
</body>
</html>
